upload_image:
  name: Upload image
  description: Upload an image to a paperlesspaper ePaper display.
  fields:
    device_id:
      name: Device
      description: The paperlesspaper ePaper display to upload to.
      required: true
      selector:
        device:
          integration: paperlesspaper
    media_content_id:
      name: Image
      description: Select an image from your media library.
      required: true
      selector:
        media:
          accept:
            - image/jpeg
            - image/png
            - image/gif
            - image/webp
            - image/svg+xml
            - image/heic
            - image/heif
