upload_image:
  name: Upload image
  description: Upload an image to a paperlesspaper ePaper display.
  fields:
    device_id:
      name: Device
      description: The paperlesspaper ePaper display to upload to.
      required: true
      example: MyEPaperDisplayId
      selector:
        device:
          integration: paperlesspaper
    media_content_id:
      name: Image
      description: Select an image from your media library.
      required: true
      example: media-source://media_source/local/my_image.png
      selector:
        media:
          accept:
            - image/jpeg
            - image/png
            - image/gif
            - image/webp
            - image/svg+xml
            - image/heic
            - image/heif
    reuse_existing_paper:
      name: Reuse existing paper
      description: >
        If enabled (default), the existing paper ID is reused for uploading.
        If disabled, a new paper is created before uploading and its ID is
        saved as the new default for this device.
      required: false
      default: true
      example: true
      selector:
        boolean:
