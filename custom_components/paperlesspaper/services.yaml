upload_image:
  name: Upload image
  description: Upload an image to a paperlesspaper ePaper display.
  target:
    device:
      integration: paperlesspaper
  fields:
    media_content_id:
      name: Image
      description: Select an image from your media library.
      required: true
      selector:
        media:
          accept:
            - image/jpeg
            - image/png
            - image/gif
            - image/webp
            - image/svg+xml
            - image/heic
            - image/heif
